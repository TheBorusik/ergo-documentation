<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP — прототип навигации</title>
<style>
  :root {
    --bg: #eef1f5;
    --panel: #ffffff;
    --ink: #1e2733;
    --ink-soft: #5b6673;
    --ink-faint: #939daa;
    --line: #e2e7ee;
    --line-soft: #eef1f5;
    --accent: #2f6db5;
    --accent-soft: #e8f0f9;
    --accent-ink: #1f5490;
    --wait: #9aa5b3;
    --work: #2f6db5;
    --done: #3a9e6e;
    --warn: #d98a1f;
    --danger: #cc4b45;
    --sidebar: #1f2a38;
    --sidebar-ink: #b7c1d0;
    --sidebar-active: #2f6db5;
    --radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; font-size: 14px; }

  .app { display: flex; height: 100vh; }

  /* ГЛАВНОЕ МЕНЮ (левое, постоянное) */
  .sidebar {
    width: 210px; background: var(--sidebar); color: var(--sidebar-ink);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .logo {
    padding: 18px 20px; font-size: 16px; font-weight: 600; color: #fff;
    letter-spacing: 0.02em; border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 9px;
  }
  .logo .mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--accent); display: grid; place-items: center;
    font-size: 13px; color: #fff;
  }
  .nav { padding: 10px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 9px 12px;
    border-radius: 7px; cursor: pointer; color: var(--sidebar-ink);
    font-size: 13.5px; transition: background .12s, color .12s; user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: var(--sidebar-active); color: #fff; }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.9; }
  .nav-sep { height:1px; background: rgba(255,255,255,0.08); margin: 8px 12px; }
  .nav-label { padding: 6px 12px 4px; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.07em; color: #6b7688; }

  /* ОСНОВНАЯ ОБЛАСТЬ */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ЛЕНТА ТАБОВ УРОВНЯ 1 */
  .tabbar {
    display: flex; align-items: stretch; background: var(--bg);
    padding: 8px 10px 0; gap: 4px; overflow-x: auto; flex-shrink: 0;
  }
  .tabbar::-webkit-scrollbar { height: 0; }
  .tab {
    display: flex; align-items: center; gap: 8px; padding: 9px 14px;
    background: transparent; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 13px; color: var(--ink-soft); white-space: nowrap;
    border: 1px solid transparent; border-bottom: none; max-width: 220px;
    transition: background .12s;
  }
  .tab:hover { background: rgba(255,255,255,0.5); }
  .tab.active { background: var(--panel); color: var(--ink); font-weight: 500;
    border-color: var(--line); }
  .tab .tab-title { overflow: hidden; text-overflow: ellipsis; }
  .tab .close {
    width: 17px; height: 17px; border-radius: 5px; display: grid; place-items: center;
    font-size: 14px; color: var(--ink-faint); flex-shrink: 0; line-height: 1;
  }
  .tab .close:hover { background: rgba(0,0,0,0.09); color: var(--ink); }
  .tab .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  /* ХОЛСТ КОНТЕНТА УРОВНЯ 1 */
  .canvas {
    flex: 1; background: var(--panel); border: 1px solid var(--line);
    border-radius: 0 8px 0 0; margin: 0 10px 0; overflow: hidden;
    display: flex; flex-direction: column; min-height: 0;
  }
  .empty {
    flex:1; display:grid; place-items:center; color: var(--ink-faint);
    text-align:center; padding: 40px;
  }
  .empty svg { width: 46px; height:46px; opacity:.3; margin-bottom: 14px; }
  .empty h3 { font-weight:500; color: var(--ink-soft); font-size: 15px; margin-bottom: 6px; }
  .empty p { font-size: 13px; max-width: 340px; line-height: 1.5; }

  /* СОДЕРЖИМОЕ ТАБА */
  .pane { flex:1; overflow: auto; display: flex; flex-direction: column; }
  .pane-head {
    padding: 18px 22px 14px; border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .pane-head h2 { font-size: 17px; font-weight: 600; }
  .pane-head .sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
  .pane-body { padding: 18px 22px; flex:1; }

  /* СПИСОК ПРОЕКТОВ / ЗАДАЧ (карточки-строки) */
  .rowlist { display: flex; flex-direction: column; gap: 8px; }
  .row {
    display: flex; align-items: center; gap: 14px; padding: 13px 16px;
    border: 1px solid var(--line); border-radius: var(--radius); cursor: pointer;
    background: var(--panel); transition: border-color .12s, box-shadow .12s;
  }
  .row:hover { border-color: var(--accent); box-shadow: 0 1px 6px rgba(47,109,181,0.08); }
  .row .r-main { flex:1; min-width:0; }
  .row .r-title { font-weight: 500; font-size: 14px; }
  .row .r-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
  .row .r-meta { font-size: 12.5px; color: var(--ink-soft); text-align: right; white-space: nowrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
    border-radius: 20px; font-size: 11.5px; font-weight: 500;
  }
  .badge .dot { width:7px; height:7px; border-radius:50%; }
  .b-wait { background:#f0f2f5; color: var(--wait); }
  .b-wait .dot { background: var(--wait); }
  .b-work { background: var(--accent-soft); color: var(--accent-ink); }
  .b-work .dot { background: var(--work); }
  .b-done { background:#e7f4ec; color: var(--done); }
  .b-done .dot { background: var(--done); }
  .b-warn { background:#fbf1e0; color: var(--warn); }
  .b-warn .dot { background: var(--warn); }

  .progress { width: 90px; height: 6px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .progress > div { height: 100%; background: var(--accent); border-radius: 4px; }

  /* ВНУТРЕННЯЯ РАСКЛАДКА ПРОЕКТА (меню + вложенные табы) */
  .project { flex:1; display: flex; min-height: 0; }
  .project-menu {
    width: 176px; border-right: 1px solid var(--line); flex-shrink: 0;
    padding: 12px 10px; display: flex; flex-direction: column; gap: 2px;
    background: #fafbfc; overflow: auto;
  }
  .pm-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 11px;
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink-soft);
    user-select: none;
  }
  .pm-item:hover { background: #eef1f5; color: var(--ink); }
  .pm-item.active { background: var(--accent-soft); color: var(--accent-ink); font-weight: 500; }
  .pm-item .pm-dot { width: 7px; height:7px; border-radius:50%; margin-left:auto; }
  .pm-label { padding: 10px 11px 4px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-faint); }

  .project-main { flex:1; display: flex; flex-direction: column; min-width: 0; }

  /* ВНУТРЕННЯЯ ЛЕНТА ТАБОВ (уровень 2) */
  .subtabbar {
    display: flex; align-items: stretch; gap: 3px; padding: 8px 12px 0;
    border-bottom: 1px solid var(--line); overflow-x: auto; flex-shrink: 0; background: #fafbfc;
  }
  .subtabbar::-webkit-scrollbar { height:0; }
  .subtab {
    display: flex; align-items: center; gap: 7px; padding: 7px 13px;
    border-radius: 7px 7px 0 0; cursor: pointer; font-size: 12.5px;
    color: var(--ink-soft); white-space: nowrap; border: 1px solid transparent;
    border-bottom: none; margin-bottom: -1px;
  }
  .subtab:hover { background: rgba(0,0,0,0.03); }
  .subtab.active { background: var(--panel); color: var(--ink); font-weight: 500;
    border-color: var(--line); }
  .subtab .close { width:16px; height:16px; border-radius:4px; display:grid;
    place-items:center; font-size:13px; color: var(--ink-faint); line-height:1; }
  .subtab .close:hover { background: rgba(0,0,0,0.09); color: var(--ink); }
  .subtab .dot { width:6px; height:6px; border-radius:50%; }

  .subcanvas { flex:1; overflow: auto; }

  /* СТЕППЕР (задача снабжения) */
  .stepper { display:flex; align-items:center; gap:0; margin: 4px 0 20px; flex-wrap: wrap; }
  .step { display:flex; align-items:center; gap:8px; }
  .step .num {
    width:26px; height:26px; border-radius:50%; display:grid; place-items:center;
    font-size:12px; font-weight:600; flex-shrink:0;
  }
  .step.done .num { background: var(--done); color:#fff; }
  .step.active .num { background: var(--accent); color:#fff; }
  .step.wait .num { background: var(--line); color: var(--ink-faint); }
  .step .lbl { font-size:12.5px; color: var(--ink-soft); }
  .step.active .lbl { color: var(--ink); font-weight:500; }
  .step-line { width:34px; height:2px; background: var(--line); margin:0 6px; }
  .step.done + .step-line, .step-line.done { background: var(--done); }

  /* ТАБЛИЦА ПОЗИЦИЙ */
  table { width:100%; border-collapse: collapse; font-size: 13px; }
  th { text-align:left; padding: 9px 12px; font-size: 11.5px; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--ink-faint); border-bottom: 1px solid var(--line);
    font-weight: 600; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--line-soft); }
  tr:last-child td { border-bottom: none; }
  .num-cell { text-align: right; font-variant-numeric: tabular-nums; }

  .card {
    border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px;
    margin-bottom: 14px;
  }
  .card h3 { font-size: 13px; font-weight:600; margin-bottom: 12px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.04em; }
  .kv { display:flex; gap: 8px; padding: 5px 0; font-size: 13px; }
  .kv .k { color: var(--ink-soft); width: 130px; flex-shrink:0; }
  .kv .v { font-weight: 500; }

  .actions { display:flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .btn {
    padding: 8px 15px; border-radius: 7px; border: 1px solid var(--line);
    background: var(--panel); font-size: 13px; cursor: pointer; color: var(--ink);
    font-family: inherit; transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #f5f7fa; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-ink); }

  .grid2 { display:grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }

  .metrics { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .metric { border:1px solid var(--line); border-radius: var(--radius); padding: 13px 15px; }
  .metric .m-lbl { font-size: 12px; color: var(--ink-soft); }
  .metric .m-val { font-size: 24px; font-weight: 600; margin-top: 3px; }

  .hint {
    background: var(--accent-soft); border: 1px solid #d3e3f3; color: var(--accent-ink);
    padding: 10px 14px; border-radius: 7px; font-size: 12.5px; margin: 14px 22px 0;
    display:flex; gap:8px; align-items:flex-start;
  }
  .hint svg { width:16px; height:16px; flex-shrink:0; margin-top:1px; }
</style>
</head>
<body>
<div class="app">
  <!-- ГЛАВНОЕ МЕНЮ -->
  <aside class="sidebar">
    <div class="logo"><span class="mark">В</span> ВентЭРП</div>
    <nav class="nav" id="mainNav">
      <div class="nav-item" data-menu="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Дашборд
      </div>
      <div class="nav-item active" data-menu="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Проекты
      </div>
      <div class="nav-item" data-menu="nomenclature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Номенклатура
      </div>
      <div class="nav-item" data-menu="suppliers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3"/></svg>
        Поставщики
      </div>
      <div class="nav-item" data-menu="purchases">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        Закупки
      </div>
      <div class="nav-sep"></div>
      <div class="nav-item" data-menu="dict">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Справочники
      </div>
    </nav>
  </aside>

  <!-- ОСНОВНАЯ ОБЛАСТЬ -->
  <div class="main">
    <div class="tabbar" id="tabbar"></div>
    <div class="canvas" id="canvas">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <h3>Выберите раздел</h3>
        <p>Нажмите пункт меню слева — он откроется вкладкой здесь.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- ДАННЫЕ (демо) ----------
const PROJECTS = [
  { id:'p1', name:'Завод сыра — вентиляция', customer:'ООО «Молоко»', stage:'Снабжение', progress:60, badge:'b-work', badgeText:'В работе', deadline:'01.03.26' },
  { id:'p2', name:'Офис BCG — кондиционирование', customer:'BCG', stage:'Монтаж', progress:80, badge:'b-work', badgeText:'В работе', deadline:'15.03.26' },
  { id:'p3', name:'Склад №4 — холодоснабжение', customer:'ООО «Фрост»', stage:'Проектирование', progress:25, badge:'b-work', badgeText:'В работе', deadline:'28.03.26' },
  { id:'p4', name:'Гараж — приточка', customer:'ИП Сидоров', stage:'Сдача', progress:95, badge:'b-done', badgeText:'Завершается', deadline:'20.02.26' },
];

const PROJECT_MENU = [
  { grp:'ОБЗОР' },
  { key:'overview', label:'Обзор', icon:'grid' },
  { key:'board', label:'Доска', icon:'columns' },
  { grp:'ЭТАПЫ' },
  { key:'design', label:'Проектирование', icon:'pen', status:'done' },
  { key:'supply', label:'Снабжение', icon:'truck', status:'work' },
  { key:'purchase', label:'Закупки', icon:'cart', status:'work' },
  { key:'works', label:'Работы', icon:'tool', status:'wait' },
  { key:'docs', label:'Документы', icon:'file', status:'wait' },
  { grp:'ДАННЫЕ' },
  { key:'positions', label:'Позиции', icon:'list' },
  { key:'kp', label:'КП', icon:'doc' },
];

const SUPPLY_TASKS = [
  { id:'t1', name:'Воздуховоды П1 → Поставщик А', supplier:'Поставщик А', positions:3, sum:'17 400 ₽', badge:'b-work', badgeText:'Оплата', step:3 },
  { id:'t2', name:'Клапаны П1 → Поставщик Б', supplier:'Поставщик Б', positions:2, sum:'8 200 ₽', badge:'b-warn', badgeText:'Согласование', step:2 },
  { id:'t3', name:'Оборудование холода → Центавр', supplier:'Центавр', positions:5, sum:'145 000 ₽', badge:'b-wait', badgeText:'Запрос цен', step:1 },
];

const TASK_POSITIONS = {
  t1: [
    { name:'Воздуховод 500×300 оц.', qty:'×10', price:'1 200 ₽', sum:'12 000 ₽' },
    { name:'Отвод 90° 500×300', qty:'×8', price:'450 ₽', sum:'3 600 ₽' },
    { name:'Врезка 500×300/200', qty:'×6', price:'300 ₽', sum:'1 800 ₽' },
  ],
  t2: [
    { name:'Клапан огнезадерж. КОМ-1', qty:'×2', price:'3 400 ₽', sum:'6 800 ₽' },
    { name:'Привод BELIMO', qty:'×2', price:'700 ₽', sum:'1 400 ₽' },
  ],
  t3: [
    { name:'Чиллер MDV LSBLG', qty:'×1', price:'98 000 ₽', sum:'98 000 ₽' },
    { name:'Фанкойл MDKA', qty:'×4', price:'11 750 ₽', sum:'47 000 ₽' },
  ],
};

// ---------- СОСТОЯНИЕ ----------
const MENU_TITLES = {
  dashboard:'Дашборд', projects:'Проекты', nomenclature:'Номенклатура',
  suppliers:'Поставщики', purchases:'Закупки', dict:'Справочники'
};
let tabs = [];          // табы уровня 1: {id, type, title, badge, projectId?, sub:{tabs:[],active}}
let activeTab = null;

// ---------- РЕНДЕР ЛЕНТЫ ТАБОВ 1 ----------
function renderTabbar(){
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id===activeTab ? ' active':'');
    let dot = t.dotClass ? `<span class="dot" style="background:${t.dotClass}"></span>` : '';
    el.innerHTML = `${dot}<span class="tab-title">${t.title}</span><span class="close" title="Закрыть">×</span>`;
    el.onclick = (e) => {
      if(e.target.classList.contains('close')){ closeTab(t.id); }
      else { activeTab = t.id; render(); }
    };
    bar.appendChild(el);
  });
}

function closeTab(id){
  const i = tabs.findIndex(t=>t.id===id);
  tabs = tabs.filter(t=>t.id!==id);
  if(activeTab===id){ activeTab = tabs.length ? tabs[Math.max(0,i-1)].id : null; }
  render();
}

function openTab(tab){
  const exist = tabs.find(t=>t.id===tab.id);
  if(!exist){ tabs.push(tab); }
  activeTab = tab.id;
  render();
}

// ---------- ГЛАВНОЕ МЕНЮ ----------
document.getElementById('mainNav').addEventListener('click', e=>{
  const item = e.target.closest('.nav-item'); if(!item) return;
  document.querySelectorAll('#mainNav .nav-item').forEach(n=>n.classList.remove('active'));
  item.classList.add('active');
  const menu = item.dataset.menu;
  openTab({ id:'menu-'+menu, type:menu, title: MENU_TITLES[menu] });
});

// ---------- РЕНДЕР КОНТЕНТА УРОВНЯ 1 ----------
function render(){
  renderTabbar();
  const canvas = document.getElementById('canvas');
  if(!activeTab){ 
    canvas.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <h3>Нет открытых вкладок</h3><p>Выберите раздел в меню слева.</p></div>`;
    return;
  }
  const tab = tabs.find(t=>t.id===activeTab);
  if(tab.type==='projects'){ canvas.innerHTML = renderProjectsList(); bindProjectRows(); }
  else if(tab.type==='project'){ canvas.innerHTML = renderProject(tab); bindProject(tab); }
  else { canvas.innerHTML = renderStub(tab.title); }
}

// СПИСОК ПРОЕКТОВ
function renderProjectsList(){
  let rows = PROJECTS.map(p=>`
    <div class="row" data-pid="${p.id}">
      <div class="r-main">
        <div class="r-title">${p.name}</div>
        <div class="r-sub">${p.customer} · этап: ${p.stage}</div>
      </div>
      <div class="progress"><div style="width:${p.progress}%"></div></div>
      <div class="r-meta">срок ${p.deadline}</div>
      <span class="badge ${p.badge}"><span class="dot"></span>${p.badgeText}</span>
    </div>`).join('');
  return `<div class="pane">
    <div class="pane-head">
      <div><h2>Проекты</h2><div class="sub">${PROJECTS.length} проекта · нажмите на проект, он откроется вкладкой</div></div>
      <button class="btn btn-primary">+ Новый проект</button>
    </div>
    <div class="pane-body"><div class="rowlist">${rows}</div></div>
  </div>`;
}
function bindProjectRows(){
  document.querySelectorAll('.row[data-pid]').forEach(r=>{
    r.onclick = ()=>{
      const p = PROJECTS.find(x=>x.id===r.dataset.pid);
      openTab({
        id:'proj-'+p.id, type:'project', title:p.name.split(' —')[0],
        dotClass:'#2f6db5', projectId:p.id,
        activeMenu:'overview', sub:{ tabs:[], active:null }
      });
    };
  });
}

// ПРОЕКТ (внутреннее меню + вложенные табы)
function renderProject(tab){
  const p = PROJECTS.find(x=>x.id===tab.projectId);
  let menu = PROJECT_MENU.map(m=>{
    if(m.grp) return `<div class="pm-label">${m.grp}</div>`;
    const dotColor = m.status==='done'?'var(--done)':m.status==='work'?'var(--work)':m.status==='wait'?'var(--wait)':'';
    const dot = m.status? `<span class="pm-dot" style="background:${dotColor}"></span>`:'';
    return `<div class="pm-item ${tab.activeMenu===m.key?'active':''}" data-mkey="${m.key}">${m.label}${dot}</div>`;
  }).join('');

  // вложенная лента табов
  let subtabs = tab.sub.tabs.map(st=>`
    <div class="subtab ${tab.sub.active===st.id?'active':''}" data-stid="${st.id}">
      ${st.dot?`<span class="dot" style="background:${st.dot}"></span>`:''}
      <span>${st.title}</span><span class="close">×</span>
    </div>`).join('');

  return `<div class="project">
    <div class="project-menu">${menu}</div>
    <div class="project-main">
      ${tab.sub.tabs.length ? `<div class="subtabbar">${subtabs}</div>`:''}
      <div class="subcanvas" id="subcanvas-${p.id}">${renderProjectContent(tab)}</div>
    </div>
  </div>`;
}

function renderProjectContent(tab){
  // если активен вложенный таб — показываем его
  if(tab.sub.active){
    const st = tab.sub.tabs.find(x=>x.id===tab.sub.active);
    if(st && st.kind==='supplyTask') return renderSupplyTask(st.taskId);
  }
  // иначе — контент выбранного пункта меню
  if(tab.activeMenu==='supply') return renderSupplyList(tab.projectId);
  if(tab.activeMenu==='overview') return renderOverview(tab.projectId);
  const item = PROJECT_MENU.find(m=>m.key===tab.activeMenu);
  return renderStub(item?item.label:'Раздел');
}

function renderOverview(pid){
  const p = PROJECTS.find(x=>x.id===pid);
  return `<div class="pane-body">
    <div class="metrics">
      <div class="metric"><div class="m-lbl">Позиций</div><div class="m-val">29</div></div>
      <div class="metric"><div class="m-lbl">Задач активных</div><div class="m-val">6</div></div>
      <div class="metric"><div class="m-lbl">Готово к закупке</div><div class="m-val">8</div></div>
      <div class="metric"><div class="m-lbl">Прогресс</div><div class="m-val">${p.progress}%</div></div>
    </div>
    <div class="card">
      <h3>О проекте</h3>
      <div class="kv"><span class="k">Заказчик</span><span class="v">${p.customer}</span></div>
      <div class="kv"><span class="k">Текущий этап</span><span class="v">${p.stage}</span></div>
      <div class="kv"><span class="k">Срок сдачи</span><span class="v">${p.deadline}</span></div>
    </div>
    <div class="card">
      <h3>Статусы этапов</h3>
      <div class="kv"><span class="k">Проектирование</span><span class="badge b-done"><span class="dot"></span>Завершён</span></div>
      <div class="kv"><span class="k">Снабжение</span><span class="badge b-work"><span class="dot"></span>В работе</span></div>
      <div class="kv"><span class="k">Закупки</span><span class="badge b-work"><span class="dot"></span>В работе</span></div>
      <div class="kv"><span class="k">Монтаж</span><span class="badge b-wait"><span class="dot"></span>Ожидание</span></div>
    </div>
  </div>`;
}

function renderSupplyList(pid){
  let rows = SUPPLY_TASKS.map(t=>`
    <div class="row" data-tid="${t.id}">
      <div class="r-main">
        <div class="r-title">${t.name}</div>
        <div class="r-sub">${t.positions} позиции · ${t.sum}</div>
      </div>
      <span class="badge ${t.badge}"><span class="dot"></span>${t.badgeText}</span>
    </div>`).join('');
  return `<div class="pane">
    <div class="pane-head">
      <div><h2>Снабжение</h2><div class="sub">${SUPPLY_TASKS.length} задачи · нажмите задачу — откроется вложенной вкладкой</div></div>
      <button class="btn btn-primary">+ Задача закупки</button>
    </div>
    <div class="pane-body"><div class="rowlist">${rows}</div></div>
  </div>`;
}

function renderSupplyTask(tid){
  const t = SUPPLY_TASKS.find(x=>x.id===tid);
  const pos = TASK_POSITIONS[tid]||[];
  const steps = ['Запрос','Цены','Согласование','Оплата','Доставка'];
  let stepper = '';
  steps.forEach((s,i)=>{
    const n=i+1;
    const cls = n<t.step?'done':n===t.step?'active':'wait';
    stepper += `<div class="step ${cls}"><div class="num">${n<t.step?'✓':n}</div><div class="lbl">${s}</div></div>`;
    if(i<steps.length-1) stepper += `<div class="step-line ${n<t.step?'done':''}"></div>`;
  });
  let posRows = pos.map(p=>`<tr><td>${p.name}</td><td class="num-cell">${p.qty}</td><td class="num-cell">${p.price}</td><td class="num-cell">${p.sum}</td></tr>`).join('');
  return `<div class="pane">
    <div class="pane-head">
      <div><h2>${t.name}</h2><div class="sub">Поставщик: ${t.supplier} · итого ${t.sum}</div></div>
      <span class="badge ${t.badge}"><span class="dot"></span>${t.badgeText}</span>
    </div>
    <div class="pane-body">
      <div class="stepper">${stepper}</div>
      <div class="grid2">
        <div class="card" style="margin:0">
          <h3>Позиции</h3>
          <table>
            <thead><tr><th>Наименование</th><th class="num-cell">Кол-во</th><th class="num-cell">Цена</th><th class="num-cell">Сумма</th></tr></thead>
            <tbody>${posRows}</tbody>
          </table>
        </div>
        <div>
          <div class="card">
            <h3>Действия</h3>
            <div class="actions">
              <button class="btn btn-primary">Отправить на оплату</button>
              <button class="btn">Изменить состав</button>
              <button class="btn">История</button>
            </div>
          </div>
          <div class="card" style="margin-top:14px">
            <h3>Это конечная вкладка</h3>
            <div style="font-size:13px;color:var(--ink-soft);line-height:1.6">
              Дальше вкладок нет — здесь работаешь с задачей.
              Путь: Проекты → проект → Снабжение → эта задача.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderStub(title){
  return `<div class="empty" style="height:100%">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <h3>${title}</h3><p>Демо-раздел. В прототипе наполнены «Проекты» → проект → «Снабжение» → задача, чтобы пройти всю цепочку вложенных вкладок.</p>
  </div>`;
}

// ---------- СВЯЗЫВАНИЕ СОБЫТИЙ ВНУТРИ ПРОЕКТА ----------
function bindProject(tab){
  // клики по внутреннему меню
  document.querySelectorAll('.pm-item[data-mkey]').forEach(m=>{
    m.onclick = ()=>{
      tab.activeMenu = m.dataset.mkey;
      tab.sub.active = null; // выходим из вложенного таба, показываем список раздела
      render();
    };
  });
  // клики по задачам снабжения → вложенный таб
  document.querySelectorAll('.row[data-tid]').forEach(r=>{
    r.onclick = ()=>{
      const t = SUPPLY_TASKS.find(x=>x.id===r.dataset.tid);
      const stId = 'st-'+t.id;
      if(!tab.sub.tabs.find(s=>s.id===stId)){
        tab.sub.tabs.push({ id:stId, title:t.name.split(' →')[0], kind:'supplyTask', taskId:t.id, dot:'#d98a1f' });
      }
      tab.sub.active = stId;
      render();
    };
  });
  // клики по вложенным табам
  document.querySelectorAll('.subtab[data-stid]').forEach(s=>{
    s.onclick = (e)=>{
      if(e.target.classList.contains('close')){
        tab.sub.tabs = tab.sub.tabs.filter(x=>x.id!==s.dataset.stid);
        if(tab.sub.active===s.dataset.stid) tab.sub.active = null;
      } else {
        tab.sub.active = s.dataset.stid;
      }
      render();
    };
  });
}

// ---------- СТАРТ ----------
openTab({ id:'menu-projects', type:'projects', title:'Проекты' });
</script>
